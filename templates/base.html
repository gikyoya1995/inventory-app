<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}在庫管理{% endblock %} | カラーミー在庫管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; }
    .stock-low { color: #dc3545; font-weight: 700; }
    .table th { background: #343a40; color: #fff; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">カラーミー在庫管理</a>
    <div class="navbar-nav">
      <a class="nav-link" href="/">商品一覧</a>
      <a class="nav-link" href="/products/add">商品追加</a>
      <a class="nav-link" href="/upload">CSV取込</a>
      <a class="nav-link" href="/orders">注文制限</a>
      <a class="nav-link" href="/sync">カラーミー同期</a>
      <a class="nav-link" href="/settings">設定</a>
    </div>
  </div>
</nav>
<div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
